<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chino Feliz - RCF</title>
    <style>
        :root {
            --rojo-chino: #B22222;
            --dorado: #FFD700;
            --negro: #121212;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--negro);
            background-image: radial-gradient(circle, #331111 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--blanco);
            margin: 0;
            padding-bottom: 110px;
        }

        header {
            background-color: var(--rojo-chino);
            text-align: center;
            padding: 20px 15px;
            border-bottom: 4px solid var(--dorado);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%; 
            border: 4px solid var(--dorado);
            object-fit: contain;
            background-color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        header h1 {
            color: var(--dorado);
            margin: 10px 0 0 0;
            font-size: 2.2rem;
            text-shadow: 2px 2px #000;
        }

        .header-info p { margin: 3px 0; font-size: 0.95rem; }

        .card {
            background: #fff;
            color: #333;
            margin: 15px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card h3 { 
            color: var(--rojo-chino); 
            border-bottom: 2px solid var(--dorado); 
            margin-top: 0;
            padding-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }

        .btn-primary { 
            background: var(--rojo-chino); 
            color: #fff; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
        }

        /* Controles de cantidad */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-qty {
            background: var(--dorado);
            border: none;
            border-radius: 5px;
            width: 35px;
            height: 35px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #order-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--rojo-chino);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 4px solid var(--dorado);
            box-sizing: border-box;
            z-index: 1000;
        }

        .total-container { font-size: 1.4rem; font-weight: bold; color: var(--dorado); }
        .btn-order { 
            background: var(--dorado); 
            color: var(--negro); 
            border: none; 
            padding: 12px 25px; 
            border-radius: 30px; 
            font-weight: bold; 
            cursor: pointer; 
        }

        .hidden { display: none; }
        footer { text-align: center; font-size: 0.8rem; padding: 20px; color: #888; }
        .btn-edit { background: #666; color: #fff; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="rcf.PNG" alt="Logo RCF" class="logo">
            <h1>CHINO FELIZ</h1>
        </div>
        <div class="header-info">
            <p>🕒 10 AM - 10 PM | 📍 Caucasia (Frente al Éxito)</p>
            <p>💰 Solo efectivo | 📱 WhatsApp: 3227241410</p>
        </div>
    </header>

    <main>
        <section id="user-section" class="card">
            <h3>📋 Datos de Entrega</h3>
            <div id="display-data" class="hidden">
                <p><strong>Para:</strong> <span id="lbl-nombre"></span></p>
                <p><strong>Dirección:</strong> <span id="lbl-direccion"></span></p>
                <button onclick="editData()" class="btn-edit">Editar Datos</button>
            </div>
            <form id="frm-registro">
                <input type="text" id="nombre" placeholder="Tu Nombre completo" required>
                <input type="text" id="direccion" placeholder="Dirección en Caucasia" required>
                <input type="tel" id="celular" placeholder="Celular/WhatsApp" required>
                <button type="submit" class="btn-primary">Guardar y Continuar</button>
            </form>
        </section>

        <section class="card">
            <h3>🍜 Nuestra Carta</h3>
            <div id="lista-productos">Cargando platos...</div>
        </section>
    </main>

    <div id="order-bar">
        <div class="total-container">
            <span style="font-size: 0.8rem; display: block; color: white;">Total Pedido:</span>
            <strong id="total-val">$0</strong>
        </div>
        <button onclick="enviarWhatsApp()" class="btn-order">PEDIR AHORA 🛒</button>
    </div>

    <footer>
        <p>© 2026 Desarrollado por <strong>Vibras Positivas</strong> - Todos los derechos reservados</p>
    </footer>

    <script>
        const WHATSAPP_NUM = "573227241410";
        let carrito = {}; // Usamos un objeto para rastrear cantidades por ID
        let miUbicacion = "No proporcionada";

        window.onload = () => {
            const usuario = JSON.parse(localStorage.getItem('rcf_data'));
            if (usuario) mostrarDatos(usuario);
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    miUbicacion = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                });
            }
            renderMenu();
        };

        const platos = [
            { id: 1, nombre: "Arroz Especial RCF", precio: 28000 },
            { id: 2, nombre: "Chop Suey Mixto", precio: 25000 },
            { id: 3, nombre: "Lumpias (3 und)", precio: 12000 },
            { id: 4, nombre: "Combo Familiar", precio: 65000 }
        ];

        function renderMenu() {
            const list = document.getElementById('lista-productos');
            list.innerHTML = platos.map(p => `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">
                    <div><strong>${p.nombre}</strong><br><span style="color:green">$${p.precio.toLocaleString()}</span></div>
                    <div class="controls">
                        <button class="btn-qty" onclick="actualizarCantidad(${p.id}, -1)">-</button>
                        <strong id="qty-${p.id}">0</strong>
                        <button class="btn-qty" onclick="actualizarCantidad(${p.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function actualizarCantidad(id, cambio) {
            if (!carrito[id]) carrito[id] = 0;
            carrito[id] = Math.max(0, carrito[id] + cambio);
            document.getElementById(`qty-${id}`).innerText = carrito[id];
            
            let totalGeneral = 0;
            platos.forEach(p => {
                if (carrito[p.id]) totalGeneral += p.precio * carrito[p.id];
            });
            document.getElementById('total-val').innerText = `$${totalGeneral.toLocaleString()}`;
        }

        document.getElementById('frm-registro').onsubmit = (e) => {
            e.preventDefault();
            const datos = {
                nombre: document.getElementById('nombre').value,
                direccion: document.getElementById('direccion').value,
                celular: document.getElementById('celular').value
            };
            localStorage.setItem('rcf_data', JSON.stringify(datos));
            mostrarDatos(datos);
        };

        function mostrarDatos(u) {
            document.getElementById('frm-registro').classList.add('hidden');
            document.getElementById('display-data').classList.remove('hidden');
            document.getElementById('lbl-nombre').innerText = u.nombre;
            document.getElementById('lbl-direccion').innerText = u.direccion;
        }

        function editData() {
            document.getElementById('frm-registro').classList.remove('hidden');
            document.getElementById('display-data').classList.add('hidden');
        }

        function enviarWhatsApp() {
            const user = JSON.parse(localStorage.getItem('rcf_data'));
            if (!user) return alert("Por favor, completa tus datos de entrega.");
            
            let pedidoActivo = platos.filter(p => carrito[p.id] > 0);
            if (pedidoActivo.length === 0) return alert("El carrito está vacío.");

            let totalFinal = 0;
            let cuerpoFactura = "";

            pedidoActivo.forEach(p => {
                let cant = carrito[p.id];
                let subtotal = p.precio * cant;
                totalFinal += subtotal;
                cuerpoFactura += `${cant} x ${p.nombre}%0A   (Un. $${p.precio.toLocaleString()}) = *$${subtotal.toLocaleString()}*%0A`;
            });

            let mensaje = `*🍜 NUEVO PEDIDO - CHINO FELIZ*%0A%0A`;
            mensaje += `*CLIENTE:* ${user.nombre}%0A`;
            mensaje += `*DIRECCIÓN:* ${user.direccion}%0A`;
            mensaje += `*TEL:* ${user.celular}%0A`;
            mensaje += `*UBICACIÓN:* ${miUbicacion}%0A`;
            mensaje += `--------------------------------%0A`;
            mensaje += `*DETALLE DEL PEDIDO:*%0A${cuerpoFactura}`;
            mensaje += `--------------------------------%0A`;
            mensaje += `*TOTAL A PAGAR: $${totalFinal.toLocaleString()}*%0A`;
            mensaje += `*FORMA DE PAGO: EFECTIVO* 💵%0A%0A`;
            mensaje += `_Desarrollado por Vibras Positivas_`;

            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${mensaje}`, '_blank');
        }
    </script>
</body>
</html>
